<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Champion - نظام إدارة الطلبات السحابي</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', 'Cairo', 'Tahoma', sans-serif; }
        body { background: #eef2f7; min-height: 100vh; }
        .site-header {
            background: #1a2a32;
            padding: 12px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }
        .logo-area { display: flex; align-items: center; gap: 15px; }
        .logo-icon { background: #f4a261; width: 55px; height: 55px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 28px; color: #1e2a3e; }
        .site-title h1 { color: #fefae0; font-size: 1.5rem; }
        .site-title p { color: #f4a261; font-size: 0.75rem; }
        .auth-section {
            display: flex;
            align-items: center;
            gap: 18px;
            background: #2e4a5c;
            padding: 6px 20px;
            border-radius: 50px;
        }
        .user-greeting { color: white; font-weight: bold; }
        .login-btn, .logout-btn { background: #f4a261; border: none; padding: 6px 18px; border-radius: 30px; cursor: pointer; font-weight: bold; }
        .logout-btn { background: #e76f51; color: white; }
        .admin-tabs, .employee-tabs {
            background: white;
            display: flex;
            gap: 12px;
            padding: 12px 25px;
            margin: 20px 30px 0 30px;
            border-radius: 60px;
            flex-wrap: wrap;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        .tab-btn { background: #e9ecef; border: none; padding: 8px 22px; border-radius: 40px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .tab-btn.active { background: #1a2a32; color: #f4a261; }
        .main-container { padding: 30px; max-width: 1400px; margin: 0 auto; }
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 28px;
            margin-top: 25px;
        }
        .product-card {
            background: white;
            border-radius: 32px;
            overflow: hidden;
            box-shadow: 0 12px 20px rgba(0,0,0,0.08);
            cursor: pointer;
            transition: 0.2s;
        }
        .product-card:hover { transform: translateY(-5px); }
        .product-img { height: 180px; background: #f1f3f5; display: flex; align-items: center; justify-content: center; }
        .product-img img { width: 100%; height: 100%; object-fit: cover; }
        .product-details { padding: 18px; }
        .product-name { font-size: 1.2rem; font-weight: bold; }
        .product-price { color: #f4a261; margin: 8px 0; }
        .order-now-btn, .edit-product-btn { background: #2a9d8f; color: white; width: 100%; padding: 8px; border-radius: 40px; border: none; font-weight: bold; cursor: pointer; margin-top: 5px; }
        .edit-product-btn { background: #f4a261; }
        .order-page, .admin-panel, .employee-panel, .login-page, .edit-product-page {
            background: white;
            border-radius: 42px;
            padding: 30px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.1);
        }
        .order-page, .edit-product-page { max-width: 800px; margin: 0 auto; }
        .option-group {
            background: #f8f9fa;
            border-radius: 28px;
            padding: 15px;
            margin: 15px 0;
            border: 1px solid #e9ecef;
        }
        .option-title { font-weight: bold; margin-bottom: 12px; font-size: 1.1rem; }
        .option-buttons { display: flex; gap: 10px; flex-wrap: wrap; }
        .option-choice {
            background: #e9ecef;
            padding: 8px 20px;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.2s;
        }
        .option-choice.selected { background: #f4a261; color: white; }
        .quantity-selector {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            background: #f8f9fa;
            padding: 15px;
            border-radius: 60px;
            margin: 20px 0;
        }
        .qty-btn { background: #1a2a32; color: white; width: 45px; height: 45px; border-radius: 50%; font-size: 24px; border: none; cursor: pointer; }
        .row-flex { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 15px; align-items: center; }
        input, select { padding: 10px 18px; border-radius: 40px; border: 1px solid #ddd; width: 100%; }
        button { cursor: pointer; font-weight: bold; }
        button.danger { background: #e76f51; color: white; }
        button.success { background: #2a9d8f; color: white; }
        button.warning { background: #f4a261; color: white; }
        .order-item {
            background: #fef9f0;
            border-radius: 24px;
            padding: 18px;
            margin-bottom: 15px;
            border-right: 6px solid #f4a261;
        }
        .options-builder {
            background: #f1f3f5;
            border-radius: 28px;
            padding: 20px;
            margin: 15px 0;
        }
        .option-card {
            background: white;
            border-radius: 20px;
            padding: 15px;
            margin-bottom: 15px;
            border: 1px solid #dee2e6;
        }
        .choice-item {
            display: flex;
            gap: 10px;
            align-items: center;
            margin: 10px 0;
            background: #f8f9fa;
            padding: 8px;
            border-radius: 40px;
        }
        .badge-delivered {
            background: #2a9d8f;
            color: white;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 0.8rem;
            display: inline-block;
        }
        .badge-pending {
            background: #e76f51;
            color: white;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 0.8rem;
            display: inline-block;
        }
        .device-info {
            background: #f4a26120;
            padding: 5px 12px;
            border-radius: 30px;
            font-size: 0.75rem;
            color: #f4a261;
            display: inline-block;
        }
        .sync-status {
            background: #2a9d8f20;
            color: #2a9d8f;
            padding: 5px 12px;
            border-radius: 30px;
            font-size: 0.7rem;
        }
        .loading-spinner {
            text-align: center;
            padding: 50px;
        }
        @media (max-width:700px){ .site-header { flex-direction: column; text-align: center; } }
    </style>
</head>
<body>
<div class="site-header">
    <div class="logo-area">
        <div class="logo-icon"><i class="fas fa-gamepad"></i></div>
        <div class="site-title">
            <h1>🏆 Champion</h1>
            <p>نظام إدارة الطلبات السحابي</p>
        </div>
    </div>
    <div class="auth-section" id="authWidget">
        <span class="user-greeting" id="userGreeting">زائر</span>
        <button id="authButton" class="login-btn">تسجيل الدخول</button>
    </div>
</div>
<div id="adminTabsContainer" style="display: none;" class="admin-tabs"></div>
<div id="employeeTabsContainer" style="display: none;" class="employee-tabs"></div>
<div class="main-container" id="mainContent">
    <div class="loading-spinner">
        <i class="fas fa-spinner fa-spin" style="font-size:40px; color:#f4a261;"></i>
        <p>جاري الاتصال بقاعدة البيانات السحابية...</p>
    </div>
</div>

<script>
    // ========== إعدادات Firebase ==========
    const firebaseConfig = {
        apiKey: "AIzaSyB30nCKFpgVAQZ-JSRx8zjoRX5ThGMzDKE",
        authDomain: "champion-dff7f.firebaseapp.com",
        projectId: "champion-dff7f",
        storageBucket: "champion-dff7f.firebasestorage.app",
        messagingSenderId: "987491522599",
        appId: "1:987491522599:web:4798e271801aba17db9602"
    };
    
    // تهيئة Firebase
    let db;
    let isFirebaseReady = false;
    
    try {
        firebase.initializeApp(firebaseConfig);
        db = firebase.firestore();
        isFirebaseReady = true;
        console.log("✅ Firebase connected successfully");
    } catch(e) {
        console.error("❌ Firebase error:", e);
        document.getElementById("mainContent").innerHTML = `<div class="admin-panel" style="color:red; text-align:center;">
            <i class="fas fa-exclamation-triangle" style="font-size:40px;"></i>
            <h3>خطأ في الاتصال بقاعدة البيانات</h3>
            <p>تأكد من إعدادات Firebase وتحقق من اتصال الإنترنت</p>
        </div>`;
    }
    
    // كشف نوع الجهاز
    function getDeviceType() {
        const userAgent = navigator.userAgent || navigator.vendor || window.opera;
        if (/android/i.test(userAgent)) return "📱 Android";
        if (/iPad|iPhone|iPod/.test(userAgent)) return "📱 iOS";
        return "💻 كمبيوتر";
    }
    
    const deviceType = getDeviceType();
    
    // البيانات الأساسية
    let products = [];
    let admins = [];
    let employees = [];
    let orders = [];
    let currentUser = null;
    let lastOrderCount = 0;
    
    const SUPER_ADMIN = { id: "super1", fullName: "المدير العام", username: "admin", password: "admin2025" };
    
    // صوت الإشعار
    function playSound() {
        try {
            let audio = new Audio("https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3");
            audio.volume = 0.4;
            audio.play().catch(() => {});
        } catch(e) {}
    }
    
    // ========== تحميل البيانات من Firebase ==========
    async function loadProducts() {
        if (!db) return [];
        const snapshot = await db.collection("products").get();
        const items = [];
        snapshot.forEach(doc => items.push({ id: doc.id, ...doc.data() }));
        return items;
    }
    
    async function loadAdmins() {
        if (!db) return [];
        const snapshot = await db.collection("admins").get();
        const items = [];
        snapshot.forEach(doc => items.push({ id: doc.id, ...doc.data() }));
        return items;
    }
    
    async function loadEmployees() {
        if (!db) return [];
        const snapshot = await db.collection("employees").get();
        const items = [];
        snapshot.forEach(doc => items.push({ id: doc.id, ...doc.data() }));
        return items;
    }
    
    // حفظ البيانات الأولية
    async function initializeData() {
        if (!db) return;
        
        // المنتجات
        let existingProducts = await loadProducts();
        if (existingProducts.length === 0) {
            const defaultProducts = [
                { id: "p1", name: "قهوة عربية", price: 25, imageUrl: "https://placehold.co/400x300?text=Coffee", options: [{ name: "الحجم", choices: [{ text: "صغير", priceModifier: 0 }, { text: "وسط", priceModifier: 5 }, { text: "كبير", priceModifier: 10 }] }] },
                { id: "p2", name: "بيبسي", price: 10, imageUrl: "https://placehold.co/400x300?text=Pepsi", options: [{ name: "النوع", choices: [{ text: "مع تلج", priceModifier: 0 }, { text: "بدون تلج", priceModifier: 0 }] }] }
            ];
            for (let p of defaultProducts) {
                await db.collection("products").doc(p.id).set(p);
            }
            products = defaultProducts;
        } else {
            products = existingProducts;
        }
        
        // الأدمن
        let existingAdmins = await loadAdmins();
        if (existingAdmins.length === 0) {
            await db.collection("admins").doc(SUPER_ADMIN.id).set(SUPER_ADMIN);
            admins = [SUPER_ADMIN];
        } else {
            admins = existingAdmins;
        }
        
        // الموظفين
        let existingEmployees = await loadEmployees();
        if (existingEmployees.length === 0) {
            const defaultEmployees = [
                { id: "emp1", fullName: "أحمد علي", username: "ahmed", password: "123" },
                { id: "emp2", fullName: "سارة خالد", username: "sara", password: "123" }
            ];
            for (let e of defaultEmployees) {
                await db.collection("employees").doc(e.id).set(e);
            }
            employees = defaultEmployees;
        } else {
            employees = existingEmployees;
        }
    }
    
    // استلام الطلبات في الوقت الفعلي
    function listenToOrders() {
        if (!db) return;
        
        db.collection("orders").orderBy("timestamp", "desc").onSnapshot((snapshot) => {
            const newOrders = [];
            snapshot.forEach(doc => newOrders.push({ id: doc.id, ...doc.data() }));
            
            // التحقق من وجود طلبات جديدة لعمل صوت
            if (orders.length > 0 && newOrders.length > orders.length) {
                playSound();
            }
            
            orders = newOrders;
            renderUI();
        }, (error) => {
            console.error("Error listening to orders:", error);
        });
    }
    
    // حفظ طلب جديد
    async function saveOrder(order) {
        if (!db) return false;
        try {
            await db.collection("orders").doc(order.id).set(order);
            return true;
        } catch(e) {
            console.error("Error saving order:", e);
            return false;
        }
    }
    
    // تحديث طلب (استلام)
    async function updateOrder(orderId, updates) {
        if (!db) return false;
        try {
            await db.collection("orders").doc(orderId).update(updates);
            return true;
        } catch(e) {
            console.error("Error updating order:", e);
            return false;
        }
    }
    
    // حفظ منتج جديد
    async function saveProduct(product) {
        if (!db) return false;
        try {
            await db.collection("products").doc(product.id).set(product);
            return true;
        } catch(e) {
            console.error("Error saving product:", e);
            return false;
        }
    }
    
    // حذف منتج
    async function deleteProductFromDB(productId) {
        if (!db) return false;
        try {
            await db.collection("products").doc(productId).delete();
            return true;
        } catch(e) {
            console.error("Error deleting product:", e);
            return false;
        }
    }
    
    // حفظ موظف جديد
    async function saveEmployee(employee) {
        if (!db) return false;
        try {
            await db.collection("employees").doc(employee.id).set(employee);
            return true;
        } catch(e) {
            console.error("Error saving employee:", e);
            return false;
        }
    }
    
    // حذف موظف
    async function deleteEmployeeFromDB(employeeId) {
        if (!db) return false;
        try {
            await db.collection("employees").doc(employeeId).delete();
            return true;
        } catch(e) {
            console.error("Error deleting employee:", e);
            return false;
        }
    }
    
    // حفظ أدمن جديد
    async function saveAdmin(admin) {
        if (!db) return false;
        try {
            await db.collection("admins").doc(admin.id).set(admin);
            return true;
        } catch(e) {
            console.error("Error saving admin:", e);
            return false;
        }
    }
    
    // حذف أدمن
    async function deleteAdminFromDB(adminId) {
        if (!db) return false;
        try {
            await db.collection("admins").doc(adminId).delete();
            return true;
        } catch(e) {
            console.error("Error deleting admin:", e);
            return false;
        }
    }
    
    // ========== دوال الطلبات ==========
    async function addOrder(productId, customerName, roomName, quantity, selectedOptions) {
        const product = products.find(p => p.id === productId);
        if (!product) return false;
        
        let extra = 0;
        let optionsText = [];
        if (selectedOptions) {
            for (let opt of selectedOptions) {
                if (opt && opt.priceModifier) extra += opt.priceModifier;
                if (opt && opt.optionName && opt.choiceText) optionsText.push(`${opt.optionName}: ${opt.choiceText}`);
            }
        }
        const unitPrice = product.price + extra;
        const totalPrice = unitPrice * quantity;
        
        const newOrder = {
            id: "ord_" + Date.now() + "_" + Math.random().toString(36).substr(2, 8),
            productId: product.id,
            productName: product.name,
            optionsText: optionsText.join(" | ") || "بدون خيارات",
            quantity: quantity,
            totalPrice: totalPrice,
            customerName: customerName,
            roomName: roomName,
            status: "pending",
            deliveredBy: null,
            deliveredAt: null,
            device: deviceType,
            createdAt: new Date().toLocaleString('ar-EG'),
            timestamp: Date.now()
        };
        
        const saved = await saveOrder(newOrder);
        if (saved) {
            alert(`✅ تم الطلب بنجاح!\n📱 من جهاز: ${deviceType}\n🍔 ${product.name}\n💰 ${totalPrice} ج.م`);
        } else {
            alert("❌ حدث خطأ في حفظ الطلب");
        }
        return saved;
    }
    
    async function receiveOrder(orderId, employeeName) {
        const order = orders.find(o => o.id === orderId);
        if (!order || order.status === "delivered") return false;
        
        const updated = await updateOrder(orderId, {
            status: "delivered",
            deliveredBy: employeeName,
            deliveredAt: new Date().toLocaleString('ar-EG')
        });
        
        if (updated) {
            alert(`✅ تم استلام الطلب بواسطة: ${employeeName}`);
        }
        return updated;
    }
    
    // ========== دوال الإدارة ==========
    async function addProductFunc(name, price, imageUrl, options) {
        if (!currentUser || currentUser.type !== "admin") return false;
        const newProduct = { 
            id: "p" + Date.now() + "_" + Math.random().toString(36).substr(2, 6),
            name: name, 
            price: Number(price), 
            imageUrl: imageUrl || "https://placehold.co/400x300", 
            options: options || [] 
        };
        const saved = await saveProduct(newProduct);
        if (saved) {
            products.push(newProduct);
            renderUI();
        }
        return saved;
    }
    
    async function updateProductFunc(productId, name, price, imageUrl, options) {
        let p = products.find(p => p.id === productId);
        if (p) {
            p.name = name; 
            p.price = Number(price); 
            p.imageUrl = imageUrl; 
            p.options = options;
            await saveProduct(p);
            renderUI();
        }
    }
    
    async function deleteProductFunc(productId) {
        products = products.filter(p => p.id !== productId);
        await deleteProductFromDB(productId);
        renderUI();
    }
    
    async function addEmployeeFunc(fullName, username, password) {
        if (!currentUser || currentUser.type !== "admin") return false;
        const newEmp = { id: "e" + Date.now() + "_" + Math.random().toString(36).substr(2, 6), fullName, username, password };
        const saved = await saveEmployee(newEmp);
        if (saved) {
            employees.push(newEmp);
            renderUI();
        }
        return saved;
    }
    
    async function deleteEmployeeFunc(id) {
        employees = employees.filter(e => e.id !== id);
        await deleteEmployeeFromDB(id);
        renderUI();
    }
    
    async function addAdminFunc(fullName, username, password) {
        if (!currentUser || currentUser.type !== "admin") return false;
        const newAdmin = { id: "a" + Date.now() + "_" + Math.random().toString(36).substr(2, 6), fullName, username, password };
        const saved = await saveAdmin(newAdmin);
        if (saved) {
            admins.push(newAdmin);
            renderUI();
        }
        return saved;
    }
    
    async function deleteAdminFunc(id) {
        if (admins.find(a => a.id === id)?.username === "admin") {
            alert("لا يمكن حذف المدير الأساسي");
            return;
        }
        admins = admins.filter(a => a.id !== id);
        await deleteAdminFromDB(id);
        renderUI();
    }
    
    // ========== تسجيل الدخول ==========
    function login(username, password) {
        let admin = admins.find(a => a.username === username && a.password === password);
        if (admin) {
            currentUser = { type: "admin", id: admin.id, fullName: admin.fullName };
            localStorage.setItem("champion_currentUser", JSON.stringify(currentUser));
            return true;
        }
        let emp = employees.find(e => e.username === username && e.password === password);
        if (emp) {
            currentUser = { type: "employee", id: emp.id, fullName: emp.fullName };
            localStorage.setItem("champion_currentUser", JSON.stringify(currentUser));
            return true;
        }
        return false;
    }
    
    function logout() {
        currentUser = null;
        localStorage.removeItem("champion_currentUser");
        renderUI();
    }
    
    function showLoginPage() {
        document.getElementById("mainContent").innerHTML = `
            <div class="login-page" style="max-width:450px; margin:auto;">
                <div style="text-align:center;">
                    <i class="fas fa-gamepad" style="font-size:60px; color:#f4a261;"></i>
                    <h2 style="margin:20px 0;">مرحباً بك في Champion</h2>
                    <p style="color:#666; margin-bottom:20px;">${deviceType}</p>
                </div>
                <input type="text" id="loginUsername" placeholder="اسم المستخدم">
                <input type="password" id="loginPassword" placeholder="كلمة المرور">
                <button id="doLogin" style="background:#f4a261; width:100%; padding:12px; margin-top:15px;">دخول</button>
            </div>
        `;
        document.getElementById("doLogin").onclick = () => {
            let u = document.getElementById("loginUsername").value;
            let p = document.getElementById("loginPassword").value;
            if (login(u, p)) renderUI(); 
            else alert("بيانات الدخول غير صحيحة");
        };
    }
    
    // ========== بناء الواجهات ==========
    let tempNewOptions = [];
    
    function renderUI() {
        updateAuthWidget();
        const adminDiv = document.getElementById("adminTabsContainer");
        const empDiv = document.getElementById("employeeTabsContainer");
        adminDiv.style.display = "none";
        empDiv.style.display = "none";
        
        if (currentUser?.type === "admin") {
            adminDiv.style.display = "flex";
            adminDiv.innerHTML = `<button class="tab-btn" data-tab="products">📦 المنتجات</button>
                <button class="tab-btn" data-tab="employees">👥 الموظفين</button>
                <button class="tab-btn" data-tab="admins">👑 المديرين</button>
                <button class="tab-btn" data-tab="allorders">📊 الطلبات الجديدة</button>
                <button class="tab-btn" data-tab="orderslog">📜 سجل الطلبات</button>`;
            attachAdminTabs();
            let active = localStorage.getItem("activeAdminTab") || "allorders";
            renderAdminPanel(active);
        } else if (currentUser?.type === "employee") {
            empDiv.style.display = "flex";
            empDiv.innerHTML = `<button class="tab-btn" data-tab="allorders">📋 استلام الطلبات</button>
                <button class="tab-btn" data-tab="empLog">📜 سجل استلاماتي</button>`;
            attachEmployeeTabs();
            renderEmployeePanel("allorders");
        } else {
            renderCustomerMenu();
        }
    }
    
    function attachAdminTabs() {
        document.querySelectorAll("#adminTabsContainer .tab-btn").forEach(btn => {
            btn.onclick = () => { 
                localStorage.setItem("activeAdminTab", btn.getAttribute("data-tab")); 
                renderAdminPanel(btn.getAttribute("data-tab")); 
            };
        });
    }
    
    function attachEmployeeTabs() {
        document.querySelectorAll("#employeeTabsContainer .tab-btn").forEach(btn => {
            btn.onclick = () => renderEmployeePanel(btn.getAttribute("data-tab"));
        });
    }
    
    function renderAdminPanel(tab) {
        const main = document.getElementById("mainContent");
        if (tab === "products") {
            main.innerHTML = `
                <div class="admin-panel">
                    <h3>➕ إضافة منتج جديد</h3>
                    <div class="row-flex"><input id="newProdName" placeholder="اسم المنتج"><input id="newProdPrice" placeholder="السعر"><input id="newProdImg" placeholder="رابط الصورة"></div>
                    <div class="options-builder">
                        <h4>⚙️ خيارات المنتج</h4>
                        <div id="optionsBuilderContainer"></div>
                        <div class="row-flex" style="margin-top:15px;"><input id="newOptionName" placeholder="اسم الخيار (مثال: الحجم)"><button id="addOptionBtn">➕ إضافة خيار</button></div>
                    </div>
                    <button id="saveProductBtn" style="background:#2a9d8f; padding:12px; width:100%;">💾 حفظ المنتج</button>
                    <hr><h3>📀 المنتجات الحالية</h3><div id="productsList" class="products-grid"></div>
                </div>
            `;
            tempNewOptions = [];
            renderTempOptionsBuilder();
            
            document.getElementById("addOptionBtn").onclick = () => {
                let optName = document.getElementById("newOptionName").value.trim();
                if (!optName) { alert("أدخل اسم الخيار"); return; }
                tempNewOptions.push({ name: optName, choices: [] });
                document.getElementById("newOptionName").value = "";
                renderTempOptionsBuilder();
            };
            
            document.getElementById("saveProductBtn").onclick = async () => {
                let name = document.getElementById("newProdName").value.trim();
                let price = document.getElementById("newProdPrice").value.trim();
                let img = document.getElementById("newProdImg").value.trim();
                if (!name || !price) { alert("اسم المنتج والسعر مطلوبان"); return; }
                await addProductFunc(name, price, img, JSON.parse(JSON.stringify(tempNewOptions)));
            };
            renderProductsList();
        }
        else if (tab === "employees") {
            let html = `<div class="admin-panel"><h3>➕ إضافة موظف جديد</h3>
                <div class="row-flex"><input id="empFull" placeholder="الاسم الكامل"><input id="empUser" placeholder="اسم المستخدم"><input id="empPass" placeholder="كلمة المرور"><button onclick="window.addEmpUI()">إضافة</button></div><hr><h3>👥 قائمة الموظفين</h3>`;
            employees.forEach(emp => {
                html += `<div style="display:flex; justify-content:space-between; align-items:center; background:#faf7f2; padding:12px 20px; border-radius:40px; margin-bottom:10px;">
                    <span><i class="fas fa-user"></i> ${emp.fullName} (${emp.username})</span>
                    <button class="danger" onclick="window.delEmpUI('${emp.id}')">حذف</button>
                </div>`;
            });
            html += `</div>`;
            main.innerHTML = html;
            
            window.addEmpUI = async () => { let n=document.getElementById("empFull").value,u=document.getElementById("empUser").value,p=document.getElementById("empPass").value; if(n&&u&&p) await addEmployeeFunc(n,u,p); else alert("املأ جميع الحقول"); };
            window.delEmpUI = async (id) => { if(confirm("حذف الموظف؟")) await deleteEmployeeFunc(id); };
        }
        else if (tab === "admins") {
            let html = `<div class="admin-panel"><h3>👑 إضافة مدير جديد</h3>
                <div class="row-flex"><input id="adminFull" placeholder="الاسم"><input id="adminUser" placeholder="اسم المستخدم"><input id="adminPass" placeholder="كلمة المرور"><button onclick="window.addAdminUI()">إضافة</button></div><hr><h3>قائمة المديرين</h3>`;
            admins.forEach(ad => { 
                html += `<div style="display:flex; justify-content:space-between; background:#f0f3f5; padding:12px 20px; border-radius:40px; margin-bottom:8px;">
                    <span>👑 ${ad.fullName} (${ad.username})</span> 
                    ${ad.username !== "admin" ? `<button class="danger" onclick="window.delAdminUI('${ad.id}')">حذف</button>` : "<span style='color:green;'>مدير أساسي</span>"}
                </div>`; 
            });
            main.innerHTML = html;
            window.addAdminUI = async () => { let n=document.getElementById("adminFull").value,u=document.getElementById("adminUser").value,p=document.getElementById("adminPass").value; if(n&&u&&p) await addAdminFunc(n,u,p); else alert("املأ جميع الحقول"); };
            window.delAdminUI = async (id) => await deleteAdminFunc(id);
        }
        else if (tab === "allorders") {
            let pending = orders.filter(o => o.status === "pending");
            let html = `<div class="admin-panel"><h3>🆕 الطلبات الجديدة</h3><div class="sync-status" style="margin-bottom:15px;">🌐 متزامن مع السحابة - يظهر من كل الأجهزة</div>`;
            if(pending.length===0) html+=`<p>لا توجد طلبات جديدة</p>`;
            pending.forEach(o => {
                html += `<div class="order-item"><b>🍔 ${o.productName}</b><br>🍽️ ${o.optionsText}<br>🔢 ${o.quantity} | 💰 ${o.totalPrice} ج.م<br>👤 ${o.customerName} | 🏠 ${o.roomName}<br>📱 جهاز الطلب: ${o.device || "غير معروف"}<br>🕐 ${o.createdAt}</div>`;
            });
            main.innerHTML = html;
        }
        else if (tab === "orderslog") {
            let html = `<div class="admin-panel"><h3>📜 سجل جميع الطلبات</h3><div class="sync-status" style="margin-bottom:15px;">🌐 متزامن مع السحابة</div>`;
            orders.forEach(o => {
                html += `<div class="order-item"><b>🍔 ${o.productName}</b> (${o.optionsText}) | 💰 ${o.totalPrice} ج.م<br>👤 ${o.customerName}<br>📱 جهاز الطلب: ${o.device || "غير معروف"}<br><span class="${o.status === "pending" ? 'badge-pending' : 'badge-delivered'}">${o.status === "pending" ? '🟡 لم يستلم' : '✅ تم الاستلام'}</span><br>${o.status === "delivered" ? `📌 استلم بواسطة: ${o.deliveredBy} في ${o.deliveredAt}` : ''}<br>🕐 ${o.createdAt}</div>`;
            });
            main.innerHTML = html;
        }
    }
    
    function renderTempOptionsBuilder() {
        const container = document.getElementById("optionsBuilderContainer");
        if (!container) return;
        if (tempNewOptions.length === 0) { container.innerHTML = `<p style="color:gray;">لا توجد خيارات. أضف خياراً جديداً.</p>`; return; }
        let html = "";
        tempNewOptions.forEach((opt, idx) => {
            html += `<div class="option-card"><div class="option-title">📌 ${opt.name} <button class="danger" onclick="window.removeNewOption(${idx})">حذف</button></div>`;
            html += `<div id="choices_${idx}">`;
            if (opt.choices && opt.choices.length) {
                opt.choices.forEach((ch, chIdx) => {
                    html += `<div class="choice-item"><input type="text" value="${ch.text}" id="newChoiceText_${idx}_${chIdx}" style="width:40%;"><input type="number" value="${ch.priceModifier}" id="newChoicePrice_${idx}_${chIdx}" style="width:30%;"><button class="danger" onclick="window.removeNewChoice(${idx}, ${chIdx})">✖</button></div>`;
                });
            }
            html += `<div class="row-flex"><input type="text" id="newChoiceName_${idx}" placeholder="اختيار جديد"><input type="number" id="newChoicePriceVal_${idx}" placeholder="سعر إضافي" value="0"><button onclick="window.addNewChoice(${idx})">➕ إضافة</button></div>`;
            html += `</div></div>`;
        });
        container.innerHTML = html;
        
        window.removeNewOption = (idx) => { tempNewOptions.splice(idx,1); renderTempOptionsBuilder(); };
        window.addNewChoice = (idx) => { let text = document.getElementById(`newChoiceName_${idx}`).value.trim(); let price = parseFloat(document.getElementById(`newChoicePriceVal_${idx}`).value) || 0; if(!text) return; if(!tempNewOptions[idx].choices) tempNewOptions[idx].choices = []; tempNewOptions[idx].choices.push({ text: text, priceModifier: price }); renderTempOptionsBuilder(); };
        window.removeNewChoice = (optIdx, chIdx) => { tempNewOptions[optIdx].choices.splice(chIdx,1); renderTempOptionsBuilder(); };
    }
    
    function renderProductsList() {
        const container = document.getElementById("productsList");
        if (!container) return;
        let html = "";
        products.forEach(p => {
            let optText = "";
            if (p.options && p.options.length) {
                optText = p.options.map(opt => `${opt.name} (${opt.choices.map(ch => ch.text + (ch.priceModifier?`+${ch.priceModifier}`:'')).join(", ")})`).join(" | ");
            }
            html += `<div class="product-card"><div class="product-img"><img src="${p.imageUrl}" onerror="this.src='https://placehold.co/400x300'"></div><div class="product-details"><div class="product-name">${p.name}</div><div class="product-price">💰 ${p.price} ج.م</div><small>خيارات: ${optText || "لا يوجد"}</small><button class="edit-product-btn" onclick="window.openEditPage('${p.id}')">✏️ تعديل</button><button class="danger" onclick="window.deleteProductFromList('${p.id}')" style="margin-top:5px;">🗑️ حذف</button></div></div>`;
        });
        container.innerHTML = html;
        window.deleteProductFromList = async (id) => { if(confirm("حذف المنتج نهائياً؟")) await deleteProductFunc(id); };
        window.openEditPage = (id) => { showEditProductPage(id); };
    }
    
    function showEditProductPage(productId) {
        const product = products.find(p => p.id === productId);
        if (!product) return;
        let editOptions = JSON.parse(JSON.stringify(product.options || []));
        
        function buildEditPage() {
            let optionsHtml = "";
            editOptions.forEach((opt, idx) => {
                optionsHtml += `<div class="option-card"><div class="option-title">📌 ${opt.name} <button class="danger" onclick="removeEditOption(${idx})">حذف</button></div><div id="editChoices_${idx}">`;
                if (opt.choices && opt.choices.length) {
                    opt.choices.forEach((ch, chIdx) => {
                        optionsHtml += `<div class="choice-item"><input type="text" value="${ch.text}" id="editChoiceText_${idx}_${chIdx}" style="width:40%;"><input type="number" value="${ch.priceModifier}" id="editChoicePrice_${idx}_${chIdx}" style="width:30%;"><button class="danger" onclick="removeEditChoice(${idx}, ${chIdx})">✖</button></div>`;
                    });
                }
                optionsHtml += `<div class="row-flex"><input type="text" id="newEditChoice_${idx}" placeholder="اختيار جديد"><input type="number" id="newEditPrice_${idx}" placeholder="سعر إضافي" value="0"><button onclick="addEditChoice(${idx})">➕ إضافة</button></div></div></div>`;
            });
            document.getElementById("mainContent").innerHTML = `<div class="edit-product-page"><button onclick="location.reload()" style="margin-bottom:20px;">⬅ رجوع</button><h2>✏️ تعديل المنتج: ${product.name}</h2><div class="row-flex"><input id="editProdName" value="${product.name}"><input id="editProdPrice" value="${product.price}"><input id="editProdImg" value="${product.imageUrl}"></div><div class="options-builder"><h4>⚙️ خيارات المنتج</h4><div id="editOptionsContainer">${optionsHtml}</div><div class="row-flex"><input id="newOptionNameEdit" placeholder="اسم خيار جديد"><button id="addNewOptionBtn">➕ إضافة خيار</button></div></div><button id="saveEditBtn" style="background:#2a9d8f; padding:12px; width:100%;">💾 حفظ التعديلات</button></div>`;
            
            window.removeEditOption = (idx) => { editOptions.splice(idx,1); buildEditPage(); };
            window.removeEditChoice = (optIdx, chIdx) => { if(editOptions[optIdx] && editOptions[optIdx].choices) editOptions[optIdx].choices.splice(chIdx,1); buildEditPage(); };
            window.addEditChoice = (idx) => { let text = document.getElementById(`newEditChoice_${idx}`).value.trim(); let price = parseFloat(document.getElementById(`newEditPrice_${idx}`).value) || 0; if(!text) return; if(!editOptions[idx].choices) editOptions[idx].choices = []; editOptions[idx].choices.push({ text: text, priceModifier: price }); buildEditPage(); };
            document.getElementById("addNewOptionBtn").onclick = () => { let newOptName = document.getElementById("newOptionNameEdit").value.trim(); if(!newOptName) return; editOptions.push({ name: newOptName, choices: [] }); document.getElementById("newOptionNameEdit").value = ""; buildEditPage(); };
            document.getElementById("saveEditBtn").onclick = async () => { 
                let newName = document.getElementById("editProdName").value.trim(); 
                let newPrice = document.getElementById("editProdPrice").value.trim(); 
                let newImg = document.getElementById("editProdImg").value.trim(); 
                if(!newName || !newPrice) { alert("اسم المنتج والسعر مطلوبان"); return; }
                for(let i=0;i<editOptions.length;i++){ 
                    if(!editOptions[i].choices) editOptions[i].choices = [];
                    for(let j=0;j<editOptions[i].choices.length;j++){ 
                        let textInput = document.getElementById(`editChoiceText_${i}_${j}`); 
                        let priceInput = document.getElementById(`editChoicePrice_${i}_${j}`); 
                        if(textInput) editOptions[i].choices[j].text = textInput.value; 
                        if(priceInput) editOptions[i].choices[j].priceModifier = parseFloat(priceInput.value) || 0; 
                    } 
                } 
                await updateProductFunc(product.id, newName, newPrice, newImg, editOptions); 
                alert("✅ تم تحديث المنتج"); 
                location.reload();
            };
        }
        buildEditPage();
    }
    
    function renderEmployeePanel(tab) {
        const main = document.getElementById("mainContent");
        if (tab === "allorders") {
            let pendingOrders = orders.filter(o => o.status === "pending");
            let html = `<div class="employee-panel">
                <h3>📋 الطلبات الجديدة</h3>
                <div class="sync-status" style="margin-bottom:15px;">🌐 متزامن مع السحابة - تظهر طلبات كل الأجهزة</div>
                <button onclick="playSound()" style="margin-bottom:15px;">🔔 اختبار الصوت</button>`;
            if (pendingOrders.length === 0) html += `<p>✨ لا توجد طلبات جديدة</p>`;
            pendingOrders.forEach(o => {
                html += `<div class="order-item">
                    <b>🍔 ${o.productName}</b><br>🍽️ ${o.optionsText}<br>🔢 ${o.quantity} | 💰 ${o.totalPrice} ج.م<br>👤 ${o.customerName} | 🏠 ${o.roomName}<br>📱 جهاز الطلب: ${o.device || "غير معروف"}<br>🕐 ${o.createdAt}<br>
                    <button class="success" onclick="window.receiveOrderFromUI('${o.id}')" style="margin-top:10px;">✅ استلام الطلب</button>
                </div>`;
            });
            main.innerHTML = html;
            window.receiveOrderFromUI = async (orderId) => {
                if (confirm(`تأكيد استلام الطلب بواسطة ${currentUser.fullName}؟`)) {
                    await receiveOrder(orderId, currentUser.fullName);
                }
            };
        }
        else if (tab === "empLog") {
            let myReceived = orders.filter(o => o.deliveredBy === currentUser.fullName);
            let html = `<div class="employee-panel"><h3>📜 سجل استلاماتي</h3>`;
            if (myReceived.length === 0) html += `<p>لا توجد طلبات مستلمة</p>`;
            myReceived.forEach(o => {
                html += `<div class="order-item"><b>🍔 ${o.productName}</b> (${o.optionsText}) | 💰 ${o.totalPrice} ج.م<br>👤 ${o.customerName} | 🏠 ${o.roomName}<br>📱 جهاز الطلب: ${o.device || "غير معروف"}<br>✅ تم الاستلام في: ${o.deliveredAt}</div>`;
            });
            main.innerHTML = html;

    function renderCustomerMenu() {
        const main = document.getElementById("mainContent");
        let html = `<div style="margin-bottom:20px;">
            <div class="device-info">📍 أنت تتصفح من: ${deviceType}</div>
            <div class="sync-status" style="margin-right:10px;">🌐 طلبك هيظهر على كل الأجهزة فوراً</div>
        </div>`;
        html += `<h2>🎮 القائمة الرئيسية</h2><div class="products-grid">`;
        products.forEach(prod => {
            html += `<div class="product-card" onclick="window.showOrderPageUI('${prod.id}')"><div class="product-img"><img src="${prod.imageUrl}" onerror="this.src='https://placehold.co/400x300'"></div><div class="product-details"><div class="product-name">${prod.name}</div><div class="product-price">💰 ${prod.price} ج.م</div><button class="order-now-btn">اطلب الآن</button></div></div>`;
        });
        html += `</div>`;
        main.innerHTML = html;
        window.showOrderPageUI = (pid) => showOrderPage(pid);
        window.renderCustomerMenu = renderCustomerMenu;
    }
    
    function showOrderPage(productId) {
        const product = products.find(p => p.id === productId);
        if (!product) return;
        let quantity = 1;
        let selectedChoices = [];
        if (product.options) {
            product.options.forEach((opt, idx) => {
                if (opt.choices && opt.choices.length) {
                    selectedChoices.push({ optionName: opt.name, choiceText: opt.choices[0].text, priceModifier: opt.choices[0].priceModifier });
                }
            });
        }
        
        function buildPage() {
            let optionsHtml = "";
            if (product.options) {
                product.options.forEach((opt, idx) => {
                    if (!opt.choices || opt.choices.length === 0) return;
                    optionsHtml += `<div class="option-group"><div class="option-title">${opt.name}</div><div class="option-buttons">`;
                    opt.choices.forEach(ch => {
                        let isSelected = selectedChoices[idx]?.choiceText === ch.text;
                        optionsHtml += `<div class="option-choice ${isSelected ? 'selected' : ''}" data-optidx="${idx}" data-choice="${ch.text}" data-mod="${ch.priceModifier}">${ch.text} ${ch.priceModifier > 0 ? `(+${ch.priceModifier})` : ''}</div>`;
                    });
                    optionsHtml += `</div></div>`;
                });
            }
            let extra = selectedChoices.reduce((s,ch) => s + (ch?.priceModifier || 0), 0);
            let total = (product.price + extra) * quantity;
            document.getElementById("mainContent").innerHTML = `<div class="order-page"><button onclick="window.renderCustomerMenu()" style="margin-bottom:15px;">⬅ رجوع</button><div style="text-align:center;"><img src="${product.imageUrl}" onerror="this.src='https://placehold.co/400x300'" style="max-width:100%; border-radius:28px;"></div><h2>${product.name}</h2><p>السعر: ${product.price} ج.م</p><div class="device-info" style="margin-bottom:15px;">📱 سيتم تسجيل طلبك من: ${deviceType} - هيظهر لكل الأجهزة</div>${optionsHtml}<div class="quantity-selector"><button class="qty-btn" id="minusQty">-</button><span class="qty-value" id="qtySpan">${quantity}</span><button class="qty-btn" id="plusQty">+</button></div><div class="row-flex"><input id="custName" placeholder="👤 اسم العميل"><input id="roomNum" placeholder="🏠 رقم الروم"></div><h3>الإجمالي: <span id="totalSpan">${total}</span> ج.م</h3><button id="confirmOrderBtn" style="width:100%; background:#2a9d8f; padding:12px;">تأكيد الطلب</button></div>`;
            
            document.querySelectorAll(".option-choice").forEach(el => {
                el.onclick = () => {
                    let idx = parseInt(el.dataset.optidx);
                    selectedChoices[idx] = { optionName: product.options[idx].name, choiceText: el.dataset.choice, priceModifier: parseFloat(el.dataset.mod) };
                    buildPage();
                };
            });
            document.getElementById("minusQty").onclick = () => { if(quantity>1) quantity--; updateTotal(); };
            document.getElementById("plusQty").onclick = () => { quantity++; updateTotal(); };
            function updateTotal() {
                let extraSum = selectedChoices.reduce((s,ch) => s + (ch?.priceModifier || 0), 0);
                let totalNow = (product.price + extraSum) * quantity;
                document.getElementById("qtySpan").innerText = quantity;
                document.getElementById("totalSpan").innerText = totalNow;
            }
            document.getElementById("confirmOrderBtn").onclick = async () => {
                let cust = document.getElementById("custName").value.trim();
                let room = document.getElementById("roomNum").value.trim();
                if(!cust || !room) { alert("أدخل اسم العميل ورقم الروم"); return; }
                await addOrder(product.id, cust, room, quantity, selectedChoices);
                renderCustomerMenu();
            };
        }
        buildPage();
    }
    
    function updateAuthWidget() {
        const span = document.getElementById("userGreeting");
        const btn = document.getElementById("authButton");
        if (currentUser) {
            span.innerText = `مرحباً ${currentUser.fullName}`;
            btn.innerText = "تسجيل خروج";
            btn.classList.add("logout-btn");
            btn.classList.remove("login-btn");
            btn.onclick = () => logout();
        } else {
            span.innerText = "زائر";
            btn.innerText = "تسجيل الدخول";
            btn.classList.remove("logout-btn");
            btn.classList.add("login-btn");
            btn.onclick = () => showLoginPage();
        }
    }
    
    // استعادة المستخدم من localStorage بعد الـ Refresh
    function restoreUser() {
        const savedUser = localStorage.getItem("champion_currentUser");
        if (savedUser) {
            try {
                const userData = JSON.parse(savedUser);
                if (userData.type === "admin" && admins.find(a => a.id === userData.id)) {
                    currentUser = userData;
                } else if (userData.type === "employee" && employees.find(e => e.id === userData.id)) {
                    currentUser = userData;
                }
            } catch(e) {}
        }
    }
    
    // بدء التشغيل
    async function startApp() {
        if (!db) return;
        
        await initializeData();
        restoreUser();
        listenToOrders();
        renderUI();
    }
    
    startApp();
</script>
